server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: spot-trading

binance:
  api-key: ${BINANCE_API_KEY:}
  api-secret: ${BINANCE_API_SECRET:}
  base-url: ${BINANCE_BASE_URL:https://api.binance.com}
  ws-url: ${BINANCE_WS_URL:wss://stream.binance.com:9443}
  symbol: ${BINANCE_SYMBOL:NIGHTUSDT}
  market:
    depth-stream: ${BINANCE_DEPTH_STREAM:depth@100ms}
    trade-stream: ${BINANCE_TRADE_STREAM:trade}
    snapshot-limit: ${BINANCE_SNAPSHOT_LIMIT:5000}
    recv-window-ms: ${BINANCE_RECV_WINDOW_MS:5000}
    rest-timeout-ms: ${BINANCE_REST_TIMEOUT_MS:3000}
    ws-reconnect-delay-ms: ${BINANCE_WS_RECONNECT_DELAY_MS:3000}
    stale-timeout-ms: ${BINANCE_STALE_TIMEOUT_MS:5000}
    max-reconnect-delay-ms: ${BINANCE_MAX_RECONNECT_DELAY_MS:30000}

strategy:
  enabled: ${STRATEGY_ENABLED:true}
  live-trading: ${STRATEGY_LIVE_TRADING:false}
  execution:
    order-type: ${STRATEGY_ORDER_TYPE:MARKET}
    quote-amount: ${STRATEGY_QUOTE_AMOUNT:5.5}
    max-position-usdt: ${STRATEGY_MAX_POSITION_USDT:10}
    cooldown-seconds: ${STRATEGY_COOLDOWN_SECONDS:20}
    max-orders-per-minute: ${STRATEGY_MAX_ORDERS_PER_MINUTE:2}
    min-exit-interval-seconds: ${STRATEGY_MIN_EXIT_INTERVAL_SECONDS:3}
  signal:
    top-levels: ${STRATEGY_SIGNAL_TOP_LEVELS:5}
    imbalance-threshold: ${STRATEGY_IMBALANCE_THRESHOLD:1.12}
    aggressive-buy-ratio-threshold: ${STRATEGY_AGGRESSIVE_BUY_RATIO_THRESHOLD:1.03}
    breakout-window-seconds: ${STRATEGY_BREAKOUT_WINDOW_SECONDS:8}
    min-price-move-ticks: ${STRATEGY_MIN_PRICE_MOVE_TICKS:0}
    max-spread-bps: ${STRATEGY_MAX_SPREAD_BPS:6}
    min-signal-hold-ms: ${STRATEGY_MIN_SIGNAL_HOLD_MS:0}
    min-conditions-to-trigger: ${STRATEGY_MIN_CONDITIONS_TO_TRIGGER:3}
  risk:
    take-profit-rate: ${STRATEGY_TAKE_PROFIT_RATE:0.0035}
    stop-loss-rate: ${STRATEGY_STOP_LOSS_RATE:0.0025}
    max-holding-seconds: ${STRATEGY_MAX_HOLDING_SECONDS:25}
    max-consecutive-losses: ${STRATEGY_MAX_CONSECUTIVE_LOSSES:2}
    pause-minutes-after-loss-limit: ${STRATEGY_PAUSE_MINUTES_AFTER_LOSS_LIMIT:30}

orderbook:
  enabled: ${ORDERBOOK_ENABLED:true}
  rebuild-on-gap: ${ORDERBOOK_REBUILD_ON_GAP:true}
  check-crossed-book: ${ORDERBOOK_CHECK_CROSSED_BOOK:true}
  log-top-levels: ${ORDERBOOK_LOG_TOP_LEVELS:5}

trading:
  startup-mode: ${TRADING_STARTUP_MODE:LIVE}
  cancel-open-orders-on-startup: ${TRADING_CANCEL_OPEN_ORDERS_ON_STARTUP:false}
  cancel-open-orders-on-shutdown: ${TRADING_CANCEL_OPEN_ORDERS_ON_SHUTDOWN:false}
  api:
    retry-cooldown-seconds: ${TRADING_API_RETRY_COOLDOWN_SECONDS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  directory: ${LOG_DIR:logs}
  level:
    root: INFO
    com.matching.trading: INFO
  file:
    name: ${LOG_FILE_PATH:${LOG_DIR:logs}/spot-trading.log}
